<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f7fa"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="0.5" stop-color="#9333ea"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <radialGradient id="orb1" cx="200" cy="120" r="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="980" cy="120" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="700" cy="560" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ec4899" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0 L0 0 0 56" fill="none" stroke="rgba(15,23,42,0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>
  <rect width="1200" height="630" fill="url(#orb3)"/>

  <!-- Logo mark -->
  <g transform="translate(80, 80)">
    <rect width="64" height="64" rx="14" fill="url(#brand)"/>
    <text x="32" y="44" text-anchor="middle" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif" font-weight="900" font-size="26" fill="#fff" letter-spacing="-1">MB</text>
  </g>
  <text x="160" y="124" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif" font-weight="700" font-size="22" fill="#0a0a0c" letter-spacing="-0.3">ModelBridge API</text>

  <!-- Headline -->
  <text x="80" y="304" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif" font-weight="800" font-size="84" fill="#0a0a0c" letter-spacing="-3">Chinese models,</text>
  <text x="80" y="404" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif" font-weight="800" font-size="84" fill="url(#brand)" letter-spacing="-3">OpenAI-compatible.</text>

  <!-- Sub -->
  <text x="80" y="476" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif" font-weight="500" font-size="26" fill="#5b6173" letter-spacing="-0.4">DeepSeek-first · OpenAI SDK · prepaid USD credits</text>

  <!-- Pill -->
  <g transform="translate(80, 524)">
    <rect width="280" height="44" rx="22" fill="rgba(147,51,234,0.06)" stroke="rgba(147,51,234,0.3)"/>
    <circle cx="22" cy="22" r="5" fill="#059669"/>
    <text x="40" y="29" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif" font-weight="600" font-size="14" fill="#9333ea" letter-spacing="0.5">deepseek-chat · LIVE ROUTE</text>
  </g>

  <!-- Domain -->
  <text x="1120" y="586" text-anchor="end" font-family="JetBrains Mono, SF Mono, Consolas, monospace" font-weight="500" font-size="18" fill="#5b6173">api.modelbridgeapi.com/v1</text>
</svg>
